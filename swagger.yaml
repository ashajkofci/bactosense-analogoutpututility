basePath: /api
definitions:
  main.AlarmDefinition:
    properties:
      changeSamplingFrequency:
        description: If true, change sampling frequency when alarm is triggered
        type: boolean
      changeSamplingFrequencyValue:
        description: in minutes
        type: integer
      condition:
        description: '> or <'
        type: string
      display:
        description: alarm limit should be displayed on chart
        type: boolean
      displayColor:
        description: Color of line on auto mode plot
        type: string
      enabled:
        description: alarms can be disabled without removing from config
        type: boolean
      name:
        type: string
      sound:
        description: Sound alarm
        type: boolean
      source:
        description: Name of metric/computation
        type: string
      streamId:
        description: SOSD stream ID
        type: integer
      threshold:
        type: number
      useSOSDStream:
        description: If true, use SOSD stream for this alarm
        type: boolean
    type: object
  main.AnalogOutputDefinition:
    properties:
      high:
        description: Value for 20 mA output
        type: number
      log:
        description: Log scale?
        type: boolean
      low:
        description: Value for 4 mA output
        type: number
      source:
        description: Name of metric/computation
        type: string
    type: object
  main.AutoScheduleEntry:
    properties:
      gates:
        description: Usually empty because it uses the gates of the AutoScheduleRule
        type: string
      hour:
        maximum: 23
        minimum: 0
        type: integer
      id:
        type: string
      minute:
        maximum: 59
        minimum: 0
        type: integer
      name:
        description: Usually empty because it uses the name of the AutoScheduleRule
        type: string
      protocol:
        description: Usually empty because it uses the protocol of the AutoScheduleRule
        type: string
      sosdStreamId:
        description: Generated from the SosdConfiguration of the parent AutoScheduleRule
        maximum: 3
        minimum: 0
        type: integer
      useSOSD:
        description: Copied from the parent AutoScheduleRule
        type: boolean
      weekday:
        allOf:
        - $ref: '#/definitions/main.Weekday'
        maximum: 6
        minimum: 0
    required:
    - protocol
    type: object
  main.AutoScheduleRule:
    properties:
      autoGenerated:
        description: Indicates whether the entry was auto-generated (for example clean_optics
          after a pause that is too long)
        type: boolean
      fromHour:
        description: 0-23 in local time
        maximum: 23
        minimum: 0
        type: integer
      gates:
        type: string
      id:
        type: string
      intervalMinutes:
        minimum: 0
        type: integer
      intervalOffsetMinutes:
        type: integer
      name:
        type: string
      protocol:
        type: string
      scheduleEntries:
        description: If empty, entries will be generated based on the interval.
        items:
          $ref: '#/definitions/main.AutoScheduleEntry'
        type: array
      sosdConfiguration:
        items:
          $ref: '#/definitions/main.SosdConfigDefinition'
        type: array
      sosdSchedulerConfig:
        description: SOSD config, for example [0,1,2,3] or [0,1,2] or [0,1,1,2] for
          double replicates on source 2
        items:
          type: integer
        type: array
      toHour:
        description: 0-23 in local time
        maximum: 23
        minimum: 0
        type: integer
      useSOSD:
        description: If true, then generate the entries with SOSD settings (alternating
          stream ids)
        type: boolean
      weekdays:
        description: Days of the week when measurements can be scheduled
        items:
          $ref: '#/definitions/main.Weekday'
        minItems: 1
        type: array
    type: object
  main.CertificateFiles:
    properties:
      certificateCrtBase64:
        type: string
      certificateKeyBase64:
        type: string
    type: object
  main.CheckUSBResponse:
    properties:
      present:
        description: True if USB stick is plugged in
        type: boolean
    type: object
  main.CommandArgs:
    properties:
      bucket:
        description: 'Optional: bucket (service or auto)'
        type: string
      gates:
        description: Short name of the gate to use.
        type: string
      name:
        description: Name of sample
        type: string
      protocol:
        description: Name of protocol to run
        type: string
      replications:
        description: Replications of main()
        type: integer
      streamId:
        description: 'Optional: stream ID (service or auto)'
        type: integer
      useSOSDStream:
        description: If true, use SOSD stream for this protocol
        type: boolean
    type: object
  main.CommandRequest:
    properties:
      command:
        description: Manager.{PublicName} of command
        type: string
      executable:
        description: Name of the executable
        type: string
      parameters:
        description: 'Command-line arguments: [''-v'', ''file.txt''] for example'
        items:
          type: string
        type: array
      scope:
        allOf:
        - $ref: '#/definitions/main.RunnerScope'
        description: Scope of the runner
    type: object
  main.DigitalInputDefinition:
    properties:
      autoArgs:
        $ref: '#/definitions/main.CommandArgs'
      autoInterval:
        description: Scheduler interval in minutes
        type: integer
      autoMode:
        description: If protocols should be run or not
        type: boolean
      enabled:
        description: If False, ignore this config
        type: boolean
      startNow:
        description: If True, start protocol immediately
        type: boolean
    type: object
  main.DigitalOutputsDefinition:
    properties:
      alarms:
        additionalProperties:
          items: {}
          type: array
        type: object
      base:
        items: {}
        type: array
      errors:
        additionalProperties:
          items: {}
          type: array
        type: object
      other:
        additionalProperties:
          items: {}
          type: array
        type: object
    type: object
  main.GateDefinition:
    properties:
      channel:
        description: Used for linear gates
        type: string
      channels:
        description: Used for polygonal gates
        items:
          type: string
        type: array
      limit:
        description: Used for linear gates
        type: number
      points:
        description: Used for polygonal gates
        items:
          items:
            format: float64
            type: number
          type: array
        type: array
      type:
        description: Polygon vs linear
        type: string
    type: object
  main.GateSetDefinition:
    properties:
      gates:
        additionalProperties:
          $ref: '#/definitions/main.GateDefinition'
        type: object
      name:
        description: Long name (display name)
        type: string
      type:
        description: LDC vs TCC
        type: string
      typeName:
        description: TCC (double gating)
        type: string
    type: object
  main.RunnerScope:
    enum:
    - software
    - hardware
    - startup
    type: string
    x-enum-comments:
      Startup: Special scope set by init.d scripts
    x-enum-descriptions:
    - ""
    - ""
    - Special scope set by init.d scripts
    x-enum-varnames:
    - SoftwareRunner
    - HardwareRunner
    - Startup
  main.SequenceDefinition:
    properties:
      bucket:
        description: 'Which bucket to store archives in: manual, auto...'
        type: string
      coolingEnable:
        description: If true, activate cooling.
        type: boolean
      name:
        description: 'Optional default batch name: one sequence can be executed for
          several batches.'
        type: string
      sequence:
        description: List of protocols to run
        items:
          $ref: '#/definitions/main.SequenceItem'
        type: array
      sequenceName:
        description: User-friendly sequence name
        type: string
      temperature:
        description: target temperature, Celsius. Only used if coolingEnable is true.
        type: integer
    type: object
  main.SequenceItem:
    properties:
      gates:
        description: Short name of the gate to use.
        type: string
      name:
        description: Sample name
        type: string
      position:
        description: Well position
        type: integer
      protocol:
        description: Which protocol to run (analysis_water, analysis_beads...)
        type: string
      replications:
        description: How many replications to run
        type: integer
    type: object
  main.Settings:
    properties:
      activationCode:
        description: Activation code for device enrollment
        type: string
      advancedSchedulerEnabled:
        description: Whether advanced scheduling is enabled
        type: boolean
      alarms:
        additionalProperties:
          $ref: '#/definitions/main.AlarmDefinition'
        description: Alarm config
        type: object
      alwaysOn:
        description: System
        type: boolean
      analogOutputs:
        items:
          $ref: '#/definitions/main.AnalogOutputDefinition'
        type: array
      apiKey:
        description: Cloud options
        type: string
      autoArgs:
        allOf:
        - $ref: '#/definitions/main.CommandArgs'
        description: Auto args are used to change the sample name and protocol in
          auto mode
      autoFirstMeasurementTimestamp:
        type: integer
      autoFluorescenceProtocolsEnabled:
        description: Optional services
        type: boolean
      autoInterval:
        description: how often to run auto mode measurement; set to 0 to freeze regeneration.
        type: integer
      autoLogout:
        description: in minutes
        type: integer
      autoMode:
        description: Is auto scheduler running?
        type: boolean
      autoModeRestart:
        description: Can auto scheduler restart after boot
        type: boolean
      autoRestartCleanup:
        description: If true, auto mode cleanup after restart
        type: boolean
      blockUserDuration:
        description: in seconds
        type: integer
      buzzerAtCompletion:
        description: If true, use the buzzer at completion
        type: boolean
      bwtOptionKey:
        description: key for BWT activation
        type: string
      classicResultMode:
        description: If true, use the old result mode
        type: boolean
      cloudDeleteAfterUpload:
        description: If true, delete results after upload
        type: boolean
      cloudNoUploadResults:
        description: If true, do not upload results to cloud
        type: boolean
      digitalInputSource:
        type: integer
      digitalInputs:
        additionalProperties:
          $ref: '#/definitions/main.DigitalInputDefinition'
        type: object
      digitalInputsActAsWires:
        type: boolean
      digitalInputsAsWires:
        additionalProperties:
          $ref: '#/definitions/main.DigitalInputDefinition'
        type: object
      digitalInputsEnabled:
        description: Digital input settings
        type: boolean
      digitalOutputs:
        $ref: '#/definitions/main.DigitalOutputsDefinition'
      dnsServer:
        type: string
      ftpMinLevel:
        description: minimum level for the FTP service
        type: integer
      gateSets:
        additionalProperties:
          $ref: '#/definitions/main.GateSetDefinition'
        type: object
      gateSetsDefault:
        additionalProperties:
          $ref: '#/definitions/main.GateSetDefinition'
        description: |-
          Special case: a read-only settings key. Included here just to propagate a
          default configuration to API clients. By not writing to yaml, we prevent
          user settings from overriding the defaults, and for example preventing us
          from adding a new default gate in the future.
        type: object
      gates:
        additionalProperties:
          $ref: '#/definitions/main.GateDefinition'
        description: Business logic settings -- passed on to Python
        type: object
      guiMode:
        description: Scheduler settings
        type: string
      instrumentId:
        description: Instrument name
        type: string
      maxFailedLoginAttempts:
        type: integer
      maxPinLength:
        description: maximum length
        type: integer
      mirrorDestinationFolder:
        description: unused
        type: string
      mirrorInterval:
        description: LFTP mirror command
        type: integer
      mirrorPassword:
        description: unused
        type: string
      mirrorServer:
        description: unused
        type: string
      mirrorUser:
        description: unused
        type: string
      mqttsBroker:
        description: Broker URL (e.g. ssl://host:port)
        type: string
      mqttsEnabled:
        description: MQTTS (MQTT over TLS) configuration
        type: boolean
      mqttsPassword:
        description: Password for broker (optional)
        type: string
      mqttsPort:
        description: Broker port
        type: integer
      mqttsTopic:
        description: Topic to publish data
        type: string
      mqttsUsername:
        description: Username for broker (optional)
        type: string
      ntpServer1:
        type: string
      ntpServer2:
        type: string
      organizationName:
        description: API key for cloud upload
        type: string
      particleAnalysisProtocolsEnabled:
        description: Optional particle analysis protocol
        type: boolean
      pinAgingDuration:
        description: PIN - password settings
        type: integer
      pinLength:
        description: minimum length
        type: integer
      portFtp:
        description: port for the ftp service
        type: string
      portModbus:
        description: port for the modbus service
        type: string
      portSsl:
        description: port for the https service
        type: string
      portVnc:
        description: port for the vnc service
        type: string
      portWeb:
        description: Server settings
        type: string
      pureOptionKey:
        description: key for pure activation
        type: string
      scientificPackageOptionKey:
        description: key for double gating activation
        type: string
      screensaverInterval:
        description: Backend stuff
        type: integer
      sequenceLast:
        allOf:
        - $ref: '#/definitions/main.SequenceDefinition'
        description: Last sequence, auto updated by runner.go
      sequencesDefault:
        additionalProperties:
          $ref: '#/definitions/main.SequenceDefinition'
        description: Default sequences for BS Multi
        type: object
      sequencesUser:
        additionalProperties:
          $ref: '#/definitions/main.SequenceDefinition'
        description: User defined sequences are however read from the yaml file.
        type: object
      serverPrefix:
        description: Prefix for server location
        type: string
      serviceContactInfo:
        description: Service contact info
        items:
          type: string
        type: array
      serviceFtp:
        description: Service FTP toggle on/off
        type: boolean
      serviceModbus:
        description: Service Modbus toggle on/off (needs activation key)
        type: boolean
      serviceSmb:
        description: Service SMB toggle on/off
        type: boolean
      serviceSsh:
        description: Service SSH toggle on/off
        type: boolean
      serviceUserManagementOption:
        description: Option Advanced User management toggle on/off (needs activation
          key)
        type: boolean
      serviceVnc:
        description: Service VNC toggle on/off
        type: boolean
      serviceWeb:
        description: Service Web server HTTP toggle on/off
        type: boolean
      serviceWebSSL:
        description: Service Web server HTTPS toggle on/off
        type: boolean
      serviceWifiAccessPoint:
        type: boolean
      serviceWifiAccessPointPassword:
        type: string
      simulationMode:
        description: Simulation mode
        type: boolean
      sosdConfig:
        description: SOSD config
        items:
          $ref: '#/definitions/main.SosdConfigDefinition'
        type: array
      sosdEnabled:
        description: SOSD
        type: boolean
      sosdSchedulerConfig:
        description: SOSD config, for example [0,1,2,3] or [0,1,2] or [0,1,1,2] for
          double replicates on source 2
        items:
          type: integer
        type: array
      timeSyncType:
        description: '0: ntp, 1: modbus tcp'
        type: boolean
      triggerAlarmWithManualMeasurements:
        description: If true, trigger alarms also with manual measurements
        type: boolean
      userManagementOptionKey:
        description: key for user management activation
        type: string
      weeklyAutoSchedule:
        allOf:
        - $ref: '#/definitions/main.WeeklyAutoSchedule'
        description: Weekly advanced scheduler
    type: object
  main.SosdConfigDefinition:
    properties:
      color:
        description: Color of the stream
        type: string
      enabled:
        description: If True, enable this stream
        type: boolean
      gateSetName:
        description: Name of the gate set to use (empty if default)
        type: string
      streamId:
        type: integer
      streamName:
        type: string
    type: object
  main.StaticIPConfig:
    properties:
      dns:
        type: string
      gateway:
        type: string
      ip:
        type: string
      netmask:
        type: string
    type: object
  main.TimeConf:
    properties:
      localDateTime:
        type: string
      timezone:
        type: string
    type: object
  main.TimeZoneTree:
    additionalProperties:
      additionalProperties:
        type: string
      type: object
    type: object
  main.USBInfo:
    properties:
      bytes:
        description: Size in bytes
        type: integer
      changelog:
        type: string
      device:
        description: Device name, for example /dev/sda
        type: string
      mount_point:
        type: string
      version:
        type: string
    type: object
  main.Weekday:
    enum:
    - 0
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6
    type: integer
    x-enum-varnames:
    - Monday
    - Tuesday
    - Wednesday
    - Thursday
    - Friday
    - Saturday
    - Sunday
  main.WeeklyAutoSchedule:
    properties:
      lastModified:
        type: string
      rules:
        items:
          $ref: '#/definitions/main.AutoScheduleRule'
        type: array
    type: object
info:
  contact:
    email: software@bnovate.com
    name: Adrian Shajkofci, bNovate Technologies SA, Switzerland
    url: https://www.bnovate.com
  description: This is the API documentation of the bSense platform. All requests
    must be authenticated through HTTP Basic Authentication with the usernames and
    passwords set on the device. Access rights follow GUI access rights (see user
    manual).
  license:
    name: All right reserved
  termsOfService: https://www.bnovate.com
  title: bSense API
  version: 3.1.0
paths:
  /data:
    get:
      produces:
      - application/json
      responses: {}
      summary: returns a JSON list of the content of all buckets in the database
      tags:
      - data
  /data/{bucket}:
    get:
      parameters:
      - description: Database bucket (auto, manual, autosampler, errors, recording,
          monitoring, log)
        in: path
        name: bucket
        type: string
      produces:
      - application/json
      responses: {}
      summary: writes a JSON list of all available Data entries
      tags:
      - data
  /data/{bucket}/{timestamp}:
    delete:
      description: Returns 200 OK even if the entry does not exist.
      parameters:
      - description: Database bucket (auto, manual, autosampler, errors, recording,
          monitoring, log)
        in: path
        name: bucket
        type: string
      - description: Timestamp of the dataitem
        in: path
        name: timestamp
        type: string
      responses: {}
      summary: removes an item to the database.
      tags:
      - data
    get:
      parameters:
      - description: Database bucket (auto, manual, autosampler, errors, recording,
          monitoring, log)
        in: path
        name: bucket
        type: string
      - description: Timestamp of the data entry. If timestamp is -1 or last, then
          it will be only the last timestamp
        in: path
        name: timestamp
        type: string
      produces:
      - application/json
      responses: {}
      summary: write the JSON summary of a single Data entry
      tags:
      - data
    post:
      description: |-
        It accepts the index as a URL parameter: POST /data/{bucket}/{timestamp},
        and writes the entire contents of the POST body as the database entry.
      parameters:
      - description: Database bucket (auto, manual, autosampler, errors, recording,
          monitoring, log)
        in: path
        name: bucket
        type: string
      - description: Timestamp of the dataitem
        in: path
        name: timestamp
        type: string
      responses: {}
      summary: adds an item to the database.
      tags:
      - data
  /data/{bucket}/from/{from}/to/{to}:
    delete:
      parameters:
      - description: Database bucket (auto, manual, autosampler, errors, recording,
          monitoring, log)
        in: path
        name: bucket
        type: string
      - description: From timestamp
        in: path
        name: from
        type: string
      - description: To timestamp
        in: path
        name: to
        type: string
      responses: {}
      summary: removes a range of entries from a bucket
      tags:
      - data
    get:
      parameters:
      - description: Database bucket (auto, manual, autosampler, errors, recording,
          monitoring, log)
        in: path
        name: bucket
        type: string
      - description: From timestamp
        in: path
        name: from
        type: string
      - description: To timestamp
        in: path
        name: to
        type: string
      produces:
      - application/json
      responses: {}
      summary: writes a JSON list of all available Data items
      tags:
      - data
  /errors:
    get:
      produces:
      - application/json
      responses: {}
      summary: writes a JSON list of all errors (from error bucket)
      tags:
      - data
  /export/history_{bucket}.csv/from/{from}/to/{to}:
    get:
      parameters:
      - description: Database bucket (auto, manual, autosampler, errors, recording,
          monitoring, log, alarms, audittrail)
        in: path
        name: bucket
        type: string
      - description: From timestamp
        in: path
        name: from
        type: string
      - description: To timestamp
        in: path
        name: to
        type: string
      responses: {}
      summary: writes a bucket's data in CSV format as response body
      tags:
      - export
  /export/history_{bucket}.pdf/from/{from}/to/{to}:
    get:
      parameters:
      - description: Database bucket (auto, manual, autosampler, errors, recording,
          monitoring, log)
        in: path
        name: bucket
        type: string
      - description: From timestamp
        in: path
        name: from
        type: string
      - description: To timestamp
        in: path
        name: to
        type: string
      responses: {}
      summary: writes a bucket's data in PDF format as response body
      tags:
      - export
  /export/history_{bucket}.xlsx/from/{from}/to/{to}:
    get:
      parameters:
      - description: Database bucket (auto, manual, autosampler, errors, recording,
          monitoring, log)
        in: path
        name: bucket
        type: string
      - description: From timestamp
        in: path
        name: from
        type: string
      - description: To timestamp
        in: path
        name: to
        type: string
      responses: {}
      summary: writes a bucket's data in XLSX format as response body
      tags:
      - export
  /rpc:
    post:
      consumes:
      - application/json
      parameters:
      - description: CommandRequest in Json format
        in: body
        name: commandRequest
        schema:
          $ref: '#/definitions/main.CommandRequest'
      responses: {}
      summary: launches a measurement or any processing on the machine
      tags:
      - rpc
  /settings:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.Settings'
      summary: returns current value of settings in JSON.
      tags:
      - settings
    post:
      consumes:
      - application/json
      parameters:
      - description: Settings in Json format
        in: body
        name: settings
        schema:
          $ref: '#/definitions/main.Settings'
      responses: {}
      summary: HandleSet manages updates to settings, by receiving validating JSON
        against the JSON schema
      tags:
      - settings
  /settings/schema:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: returns the JSON schema to validate forms
      tags:
      - settings
  /status:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: Keys
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Returns all status keys and values
      tags:
      - status
  /status/{key}:
    get:
      parameters:
      - description: bottle info
        in: query
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: value store as string
          schema:
            type: string
      summary: returns the value of just one status key, as plain text.
      tags:
      - status
  /ws:
    get:
      produces:
      - application/json
      responses: {}
      summary: 'Websocket publisher pushing real-time data. It can be used to monitor
        processes on the device. The JSON produced will comprise of two fields: event
        and body. Event can be status (update of the status API), exit (when a protocol
        is finished), or stderr (low-level debug information). The body is another
        JSON string that tells what entry in status has changed.'
      tags:
      - publisher
swagger: "2.0"
